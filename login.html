<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly Travel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="scroll-progress" id="scrollProgress"></div>
  <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

  <header class="header scrolled" id="header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.webp" alt="Stackly" class="logo-img">
      </a>
      <nav class="nav" id="nav">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="destinations.html" class="nav-link">Destinations</a></li>
          <li><a href="packages.html" class="nav-link">Packages</a></li>
          <li><a href="gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="packages.html" class="btn btn-primary">Book Now</a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <a href="index.html" class="auth-logo">
            <img src="assets/images/logo.webp" alt="Stackly" class="logo-img">
          </a>
          <h2>Welcome Back</h2>
          <p>Sign in to continue your journey</p>
        </div>
        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="your@email.com" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="Please enter a valid email (e.g., abc@gmail.com)" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter your password" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*_]).+" title="Must contain at least one uppercase, one lowercase, one number, and one special character" required>
          </div>
          <div class="form-group">
            <label class="form-label">Sign In As</label>
            <div class="role-toggle">
              <label class="role-option">
                <input type="radio" name="role" value="user" checked>
                <span class="role-label"><i class="fas fa-user"></i> User</span>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="admin">
                <span class="role-label"><i class="fas fa-shield-alt"></i> Admin</span>
              </label>
            </div>
          </div>
          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" required> Remember me
            </label>
            <a href="404.html" class="forgot-link">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-large btn-submit">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>
        <div class="auth-divider"><span>Or continue with</span></div>
        <div class="auth-social">
          <a href="404.html" class="social-btn google"><i class="fab fa-google"></i> Google</a>
          <a href="404.html" class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
        </div>
        <p class="auth-footer-text">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>
  </section>

  <script src="assets/js/main.js"></script>
</body>
</html>
